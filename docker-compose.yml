services:
  kiro-admin:
    build:
      context: .
    image: kiro-admin:local
    container_name: kiro-admin
    environment:
      KIRO_ADMIN_TOKEN_DIR: /tokens
      KIRO_ADMIN_PASSWORD: ${KIRO_ADMIN_PASSWORD:-admin}
    ports:
      - "18080:8080"
    volumes:
      - kiro-admin-tokens:/tokens
    restart: unless-stopped

volumes:
  kiro-admin-tokens:
